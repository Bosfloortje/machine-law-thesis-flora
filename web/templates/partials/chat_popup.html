<!-- Chat popup + Knowledge graph modal + Path tree modal: shared Alpine.js state -->
<style>
  .path-tree details > summary { list-style: none; }
  .path-tree details > summary::-webkit-details-marker { display: none; }
  .path-tree details > summary::marker { display: none; }
  .path-tree details[open] > summary .path-arrow { transform: rotate(90deg); }
</style>

<div id="chat-popup-root" x-data="chatPopup()">

    <!-- ── Chat popup ──────────────────────────────────────────────── -->
    <div id="chat-popup"
         x-show="open"
         x-cloak
         class="fixed bottom-6 right-6 z-[9000] w-[420px] flex flex-col rounded-2xl shadow-2xl border border-gray-200 bg-white overflow-hidden"
         style="max-height: 560px; display: none;">

        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 bg-blue-600 text-white">
            <div class="flex items-center gap-2 min-w-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
                </svg>
                <span class="text-sm font-semibold truncate" x-text="lawName || 'Uitleg'"></span>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <!-- Edit details button -->
                <button x-show="step === 'chat' && inputFields.length > 0"
                        @click="step = 'confirm'"
                        :title="$store.lang === 'en' ? 'Edit details' : 'Gegevens aanpassen'"
                        class="text-white/80 hover:text-white cursor-pointer p-0.5 rounded transition-colors hover:bg-white/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
                <!-- Knowledge graph button -->
                <button x-show="step === 'chat' && messages.length > 0"
                        @click="openKnowledgeGraph()"
                        :title="$store.lang === 'en' ? 'View knowledge graph' : 'Bekijk kennisgraaf'"
                        class="text-white/80 hover:text-white cursor-pointer p-0.5 rounded transition-colors hover:bg-white/20">
                    <!-- Nodes icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M7 12a3 3 0 100-6 3 3 0 000 6zM17 7a3 3 0 100-6 3 3 0 000 6zM17 19a3 3 0 100-6 3 3 0 000 6z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M9.9 10.6L14 8M9.9 13.4L14 16"/>
                    </svg>
                </button>
                <!-- Dependency graph button -->
                <button x-show="step === 'chat' && messages.length > 0"
                        @click="openGraph()"
                        :title="$store.lang === 'en' ? 'View law dependency graph' : 'Bekijk wettengraaf'"
                        class="text-white/80 hover:text-white cursor-pointer p-0.5 rounded transition-colors hover:bg-white/20">
                    <!-- Grid/network icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                    </svg>
                </button>
                <!-- Close button -->
                <button @click="close()" class="text-white/80 hover:text-white cursor-pointer p-0.5 rounded transition-colors hover:bg-white/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- ── Confirm step ─────────────────────────────────────────── -->
        <div x-show="step === 'confirm'"
             class="flex-1 flex flex-col overflow-hidden bg-gray-50"
             style="min-height: 300px; max-height: 440px;">

            <!-- Loading input fields -->
            <div x-show="loading" class="flex-1 flex items-center justify-center">
                <div class="flex flex-col items-center gap-3">
                    <svg class="w-6 h-6 text-blue-500 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    <span class="text-sm text-gray-400"
                          x-text="$store.lang === 'en' ? 'Loading details…' : 'Gegevens ophalen…'"></span>
                </div>
            </div>

            <!-- Fields form -->
            <div x-show="!loading && inputFields.length > 0"
                 class="flex-1 overflow-y-auto px-4 pt-3 pb-1 space-y-2">
                <p class="text-xs text-gray-500 mb-2"
                   x-text="$store.lang === 'en'
                       ? 'The following details were used in the calculation. Are they correct?'
                       : 'De volgende gegevens zijn gebruikt in de berekening. Kloppen ze?'"></p>
                <template x-for="field in inputFields" :key="field.name">
                    <div x-show="_isFieldVisible(field)" class="flex items-center gap-2">
                        <label class="flex-1 min-w-0">
                            <span class="block text-xs text-gray-500 truncate" x-text="field.description"></span>
                            <!-- Boolean field -->
                            <template x-if="field.type === 'boolean'">
                                <select :name="field.name"
                                        @change="editedValues[field.name] = $event.target.value === 'true'"
                                        class="mt-0.5 w-full rounded-lg border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
                                    <option :value="true" :selected="field.value === true || field.value === 'true'"
                                            x-text="$store.lang === 'en' ? 'Yes' : 'Ja'">Ja</option>
                                    <option :value="false" :selected="field.value === false || field.value === 'false'"
                                            x-text="$store.lang === 'en' ? 'No' : 'Nee'">Nee</option>
                                </select>
                            </template>
                            <!-- Amount field (in cents, show as euros) -->
                            <template x-if="field.type === 'amount'">
                                <div class="mt-0.5 relative">
                                    <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-sm">€</span>
                                    <input type="number"
                                           step="0.01"
                                           :value="_amountDisplay(field.value)"
                                           @input="editedValues[field.name] = Math.round(parseFloat($event.target.value) * 100) || 0"
                                           class="w-full rounded-lg border border-gray-300 pl-6 pr-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                                </div>
                            </template>
                            <!-- Number / string field -->
                            <template x-if="field.type !== 'boolean' && field.type !== 'amount'">
                                <input :type="field.type === 'number' ? 'number' : 'text'"
                                       :value="field.value ?? ''"
                                       @input="editedValues[field.name] = field.type === 'number' ? Number($event.target.value) : $event.target.value"
                                       class="mt-0.5 w-full rounded-lg border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                            </template>
                        </label>
                    </div>
                </template>
            </div>

            <!-- Confirm button -->
            <div x-show="!loading" class="px-4 py-3 bg-white border-t border-gray-200 shrink-0 flex gap-2">
                <button x-show="messages.length > 0" @click="step = 'chat'"
                        class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700 cursor-pointer transition-colors"
                        x-text="$store.lang === 'en' ? 'Cancel' : 'Annuleren'"></button>
                <button @click="confirmFields()"
                        class="flex-1 bg-blue-600 text-white rounded-xl py-2 text-sm font-medium hover:bg-blue-700 cursor-pointer transition-colors"
                        x-text="messages.length > 0
                            ? ($store.lang === 'en' ? 'Re-explain with these details' : 'Opnieuw uitleggen')
                            : ($store.lang === 'en' ? 'Confirm and explain' : 'Klopt, leg uit')"></button>
            </div>
        </div>

        <!-- ── Chat step ──────────────────────────────────────────────── -->
        <!-- Messages -->
        <div id="chat-popup-messages"
             x-show="step === 'chat'"
             class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"
             style="min-height: 300px; max-height: 380px;">
            <template x-if="loading && step === 'chat'">
                <div class="flex gap-2">
                    <div class="w-7 h-7 rounded-full bg-blue-100 shrink-0 flex items-center justify-center">
                        <svg class="w-4 h-4 text-blue-500 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                    </div>
                    <div class="animate-pulse space-y-1 flex-1 pt-1">
                        <div class="h-3 bg-gray-200 rounded w-3/4"></div>
                        <div class="h-3 bg-gray-200 rounded w-full"></div>
                        <div class="h-3 bg-gray-200 rounded w-5/6"></div>
                    </div>
                </div>
            </template>
            <template x-for="(msg, i) in messages" :key="i">
                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start gap-2'">
                    <template x-if="msg.role === 'assistant'">
                        <div class="w-7 h-7 rounded-full bg-blue-100 shrink-0 flex items-center justify-center mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
                            </svg>
                        </div>
                    </template>
                    <div :class="msg.role === 'user'
                            ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm px-3 py-2 max-w-[80%] text-sm'
                            : 'bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-3 py-2 max-w-[85%] text-sm text-gray-700 shadow-sm'"
                         x-html="msg.html || msg.text"></div>
                </div>
            </template>
            <template x-if="thinking">
                <div class="flex justify-start gap-2">
                    <div class="w-7 h-7 rounded-full bg-blue-100 shrink-0 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
                        </svg>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-3 py-2 shadow-sm flex gap-1 items-center">
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:0ms"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:150ms"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>
                    </div>
                </div>
            </template>
        </div>

        <!-- Input (only in chat step) -->
        <div x-show="step === 'chat'" class="border-t border-gray-200 bg-white px-3 py-2 flex gap-2 items-end">
            <textarea x-model="inputText"
                      @keydown.enter.prevent="!$event.shiftKey && send()"
                      :disabled="!connected || thinking"
                      rows="1"
                      :placeholder="$store.lang === 'en' ? 'Ask a follow-up question...' : 'Stel een vervolgvraag...'"
                      class="flex-1 resize-none rounded-xl border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 disabled:bg-gray-50 disabled:text-gray-400"
                      style="max-height:80px; overflow-y:auto"></textarea>
            <button @click="send()"
                    :disabled="!connected || thinking || !inputText.trim()"
                    class="h-9 w-9 shrink-0 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </div>
        <div class="px-3 pb-2 bg-white" x-show="step === 'chat' && provider">
            <span class="text-xs text-gray-400"
                  x-text="($store.lang === 'en' ? 'Generated by ' : 'Gegenereerd door ') + provider"></span>
        </div>
    </div>

    <!-- ── Knowledge graph modal ────────────────────────────────────── -->
    <div x-show="showKnowledgeGraph"
         x-cloak
         class="fixed inset-0 z-[9500] flex items-center justify-center"
         style="background: rgba(0,0,0,0.65); display: none;"
         @keydown.escape.window="showKnowledgeGraph = false">

        <div class="bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden"
             style="width: 92vw; height: 90vh;">

            <!-- Modal header with tabs -->
            <div class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-200 shrink-0">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M7 12a3 3 0 100-6 3 3 0 000 6zM17 7a3 3 0 100-6 3 3 0 000 6zM17 19a3 3 0 100-6 3 3 0 000 6z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                  d="M9.9 10.6L14 8M9.9 13.4L14 16"/>
                        </svg>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-semibold text-gray-900 text-sm truncate"
                            x-text="($store.lang === 'en' ? 'Knowledge graph — ' : 'Kennisgraaf — ') + (lawName || '')"></h3>
                        <p class="text-xs text-gray-500 mt-0.5"
                           x-text="$store.lang === 'en'
                               ? 'Interactive decision graph — same as --visualize in the extract script'
                               : 'Interactieve beslissingsgraaf — zelfde als --visualize in het extract script'"></p>
                    </div>
                </div>
                <!-- Tabs + close -->
                <div class="flex items-center gap-2 shrink-0 ml-3">
                    <div class="flex rounded-lg border border-gray-200 overflow-hidden text-xs">
                        <button @click="kgTab = 'graph'"
                                :class="kgTab === 'graph' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'"
                                class="px-3 py-1.5 font-medium transition-colors cursor-pointer"
                                x-text="$store.lang === 'en' ? 'Graph' : 'Graaf'">Graaf</button>
                        <button @click="kgTab = 'tree'"
                                :class="kgTab === 'tree' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'"
                                class="px-3 py-1.5 font-medium transition-colors cursor-pointer border-l border-gray-200"
                                x-text="$store.lang === 'en' ? 'Raw path' : 'Redeneerpad'">Redeneerpad</button>
                    </div>
                    <button @click="showKnowledgeGraph = false"
                            class="p-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tab: interactive graph -->
            <div x-show="kgTab === 'graph'" class="flex-1 relative overflow-hidden">
                <!-- Loading state -->
                <div x-show="kgLoading" class="absolute inset-0 flex items-center justify-center bg-white z-10">
                    <div class="flex flex-col items-center gap-3">
                        <svg class="w-8 h-8 text-blue-500 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                        <span class="text-sm text-gray-500"
                              x-text="$store.lang === 'en' ? 'Building graph…' : 'Graaf laden…'"></span>
                    </div>
                </div>
                <!-- Error state -->
                <div x-show="kgError" class="absolute inset-0 flex items-center justify-center bg-white z-10 p-8">
                    <div class="text-center">
                        <p class="text-red-500 font-medium mb-2"
                           x-text="$store.lang === 'en' ? 'Could not build graph' : 'Graaf kon niet worden gebouwd'"></p>
                        <p class="text-sm text-gray-400" x-text="kgError"></p>
                    </div>
                </div>
                <!-- Cytoscape container -->
                <div id="cy-container" class="w-full h-full"></div>
                <!-- Node detail tooltip -->
                <div x-show="kgTooltip"
                     x-cloak
                     class="absolute bottom-4 left-4 bg-white border border-gray-200 rounded-xl shadow-lg p-3 max-w-xs text-xs z-20"
                     style="display:none">
                    <div class="font-semibold text-gray-800 mb-1" x-text="kgTooltip?.label"></div>
                    <div class="text-gray-500 mb-1">
                        <span class="font-medium" x-text="kgTooltip?.node_type"></span>
                    </div>
                    <template x-if="kgTooltip?.status">
                        <div class="mt-1">
                            <span :class="kgTooltip.status === 'SATISFIED' ? 'text-green-600' : 'text-red-500'"
                                  x-text="kgTooltip.status"></span>
                        </div>
                    </template>
                    <template x-if="kgTooltip?.value !== undefined && kgTooltip?.value !== ''">
                        <div class="mt-1 font-mono text-gray-700" x-text="kgTooltip.value"></div>
                    </template>
                    <p class="text-gray-400 mt-2 italic"
                       x-text="$store.lang === 'en' ? 'Click elsewhere to dismiss' : 'Klik ergens anders om te sluiten'"></p>
                </div>
            </div>

            <!-- Tab: raw path tree -->
            <div x-show="kgTab === 'tree'" class="flex-1 overflow-y-auto p-4 path-tree text-sm">
                <!-- Legend -->
                <div class="flex flex-wrap gap-1.5 mb-3 pb-3 border-b border-gray-100">
                    <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-xs font-medium">SOURCE</span>
                    <span class="px-1.5 py-0.5 rounded bg-green-100 text-green-700 text-xs font-medium">PARAMETER</span>
                    <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 text-xs font-medium">CLAIM</span>
                    <span class="px-1.5 py-0.5 rounded bg-gray-100 text-gray-600 text-xs font-medium">DEFINITION</span>
                    <span class="px-1.5 py-0.5 rounded bg-purple-100 text-purple-700 text-xs font-medium">SERVICE</span>
                    <span class="px-1.5 py-0.5 rounded bg-red-100 text-red-500 text-xs font-medium">NONE</span>
                </div>
                <template x-if="!pathTree">
                    <div class="flex items-center justify-center h-32 text-gray-400"
                         x-text="$store.lang === 'en' ? 'No path data available.' : 'Geen paddata beschikbaar.'"></div>
                </template>
                <template x-if="pathTree">
                    <div x-html="$data._renderPath(pathTree, 0)"></div>
                </template>
            </div>
        </div>
    </div>

    <!-- ── Law dependency graph modal ──────────────────────────────── -->
    <div x-show="showGraph"
         x-cloak
         class="fixed inset-0 z-[9500] flex items-center justify-center"
         style="background: rgba(0,0,0,0.65); display: none;"
         @keydown.escape.window="showGraph = false">

        <div class="bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden"
             style="width: 92vw; height: 88vh;">
            <div class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-200 shrink-0">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-semibold text-gray-900 text-sm truncate"
                            x-text="($store.lang === 'en' ? 'Law dependency graph — ' : 'Wettengraaf — ') + (lawName || '')"></h3>
                        <p class="text-xs text-gray-500 mt-0.5"
                           x-text="$store.lang === 'en'
                               ? 'Interactive overview of laws and their mutual dependencies'
                               : 'Interactief overzicht van wetten en hun onderlinge afhankelijkheden'"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0 ml-3">
                    <a :href="graphUrl" target="_blank" rel="noopener"
                       class="flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-800 px-3 py-1.5 border border-blue-200 rounded-lg hover:bg-blue-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                        <span x-text="$store.lang === 'en' ? 'Open in new tab' : 'Open in nieuw tabblad'"></span>
                    </a>
                    <button @click="showGraph = false"
                            class="p-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <template x-if="graphAvailable === false">
                <div class="flex-1 flex flex-col items-center justify-center gap-4 text-center px-8 bg-gray-50">
                    <p class="font-medium text-gray-700" x-text="$store.lang === 'en' ? 'Graph not yet built' : 'Graph nog niet gebouwd'"></p>
                    <code class="bg-gray-100 text-gray-800 text-sm px-4 py-2 rounded-lg font-mono block">cd analysis/graph &amp;&amp; npm run build</code>
                </div>
            </template>
            <template x-if="graphAvailable !== false">
                <iframe x-bind:src="showGraph ? graphUrl : ''"
                        class="flex-1 w-full border-0" title="Law dependency graph" allow="fullscreen"></iframe>
            </template>
        </div>
    </div>

</div><!-- end shared Alpine.js wrapper -->

<script>
// Lazy-load Cytoscape.js + dagre layout from CDN
let _cyLoaded = false;
function _loadCytoscape(cb) {
    if (_cyLoaded) { cb(); return; }
    const scripts = [
        'https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js',
        'https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js',
    ];
    let i = 0;
    function next() {
        if (i >= scripts.length) { _cyLoaded = true; cb(); return; }
        const s = document.createElement('script');
        s.src = scripts[i++];
        s.onload = next;
        document.head.appendChild(s);
    }
    next();
}

function chatPopup() {
    return {
        open: false,
        loading: false,
        connected: false,
        thinking: false,
        messages: [],
        inputText: '',
        lawName: '',
        provider: '',
        ws: null,
        bsn: '',
        clientId: '',
        _pendingService: '',
        _pendingLaw: '',
        step: 'idle',        // 'idle' | 'confirm' | 'chat'
        inputFields: [],
        editedValues: {},

        // Knowledge graph modal
        showKnowledgeGraph: false,
        kgTab: 'graph',
        kgLoading: false,
        kgError: null,
        kgTooltip: null,
        pathTree: null,

        // Law dependency graph modal
        showGraph: false,
        graphAvailable: null,
        graphUrl: '/analysis/graph/?demo=true',

        async openWithExplanation(service, law, bsn, lawDisplayName, kvk) {
            this.bsn = bsn;
            this._kvk = kvk || null;
            this.lawName = lawDisplayName || law;
            this._pendingService = service;
            this._pendingLaw = law;
            this.messages = [];
            this.inputText = '';
            this.connected = false;
            this.thinking = false;
            this.loading = true;
            this.open = true;
            this.provider = '';
            this.showGraph = false;
            this.showKnowledgeGraph = false;
            this.pathTree = null;
            this.kgError = null;
            this.inputFields = [];
            this.editedValues = {};
            this.step = 'confirm';

            if (this.graphAvailable === null) {
                fetch('/analysis/graph/', { method: 'HEAD' })
                    .then(r => { this.graphAvailable = r.ok; })
                    .catch(() => { this.graphAvailable = false; });
            }

            // Fetch input fields for the confirmation step (no LLM yet)
            try {
                let url = `/laws/input-fields?service=${encodeURIComponent(service)}&law=${encodeURIComponent(law)}&bsn=${encodeURIComponent(bsn)}`;
                if (kvk) url += `&kvk=${encodeURIComponent(kvk)}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.error) throw new Error(data.error);
                this.inputFields = data.fields || [];
                // Ensure partner-dependent fields (PARTNER_*, GEZAMENLIJK_VERMOGEN) are
                // ordered directly below HEEFT_PARTNER, regardless of spec order.
                const _pf = this.inputFields.filter(f => this._isPartnerField(f));
                if (_pf.length > 0) {
                    const _npf = this.inputFields.filter(f => !this._isPartnerField(f));
                    const _pi = _npf.findIndex(f => f.name === 'HEEFT_PARTNER');
                    if (_pi !== -1) { _npf.splice(_pi + 1, 0, ..._pf); } else { _npf.push(..._pf); }
                    this.inputFields = _npf;
                }
                if (data.law_name) this.lawName = data.law_name;
            } catch (e) {
                this.inputFields = [];
            }

            this.loading = false;

            // If no fields to confirm, skip straight to explanation
            if (this.inputFields.length === 0) {
                this.step = 'chat';
                this._fetchExplanation({});
            }
        },

        async confirmFields() {
            const isReconfirm = this.messages.length > 0;
            this.step = 'chat';
            await this._fetchExplanation(this.editedValues, isReconfirm);
        },

        async _fetchExplanation(overrides, reconfirm = false) {
            this.loading = true;
            const currentLang = localStorage.getItem('regelrecht-lang') || 'nl';
            let explanation = null;
            try {
                let url = `/laws/explanation-text?service=${encodeURIComponent(this._pendingService)}&law=${encodeURIComponent(this._pendingLaw)}&bsn=${encodeURIComponent(this.bsn)}&lang=${currentLang}`;
                if (this._kvk) url += `&kvk=${encodeURIComponent(this._kvk)}`;
                if (overrides && Object.keys(overrides).length > 0) {
                    url += `&overrides=${encodeURIComponent(JSON.stringify(overrides))}`;
                }
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.error) throw new Error(data.error);
                explanation = data.explanation;
                this.provider = data.provider || '';
                if (data.law_name) this.lawName = data.law_name;
                if (data.path) this.pathTree = data.path;
            } catch (e) {
                explanation = (localStorage.getItem('regelrecht-lang') === 'en')
                    ? 'An error occurred while fetching the explanation.'
                    : 'Er is een fout opgetreden bij het ophalen van de uitleg.';
            }
            this.loading = false;
            if (reconfirm) {
                // Add a separator message so it's clear this is a recalculation
                const sep = currentLang === 'en' ? '↩ Recalculated with updated details' : '↩ Herberekend met aangepaste gegevens';
                this.messages.push({ role: 'user', text: sep, html: `<span class="italic text-xs opacity-75">${this._esc(sep)}</span>` });
            }
            this.messages.push({ role: 'assistant', text: '', html: this._md(explanation) });
            this._scrollToBottom();
            this._connectWS(explanation);
        },

        _amountDisplay(val) {
            if (val === null || val === undefined || val === '') return '0.00';
            return (Number(val) / 100).toFixed(2);
        },

        // Returns the effective current value for a boolean flag field (e.g. HEEFT_PARTNER),
        // preferring user-edited values over the original fetched value.
        _currentBoolValue(fieldName) {
            const edited = this.editedValues[fieldName];
            if (edited !== undefined) return edited === true;
            const f = this.inputFields.find(f => f.name === fieldName);
            return f ? f.value === true : false;
        },

        // Whether a field requires an active partner to be visible.
        _isPartnerField(field) {
            const n = field.name.toUpperCase();
            return n.startsWith('PARTNER_') || n === 'GEZAMENLIJK_VERMOGEN';
        },

        // Whether a field should be visible.  Partner-related fields are only shown
        // when HEEFT_PARTNER is currently true.
        _isFieldVisible(field) {
            if (this._isPartnerField(field)) {
                return this._currentBoolValue('HEEFT_PARTNER');
            }
            return true;
        },

        openGraph() { this.showGraph = true; },

        openKnowledgeGraph() {
            this.showKnowledgeGraph = true;
            this.kgTab = 'graph';
            // Slight delay to let the DOM render before Cytoscape mounts
            setTimeout(() => this._renderCytoscape(), 50);
        },

        _renderCytoscape() {
            this.kgLoading = true;
            this.kgError = null;
            this.kgTooltip = null;

            _loadCytoscape(async () => {
                try {
                    const url = `/laws/knowledge-graph?service=${encodeURIComponent(this._pendingService)}&law=${encodeURIComponent(this._pendingLaw)}&bsn=${encodeURIComponent(this.bsn)}`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.error) throw new Error(data.error);

                    const container = document.getElementById('cy-container');
                    if (!container) throw new Error('Container not found');

                    // Destroy existing instance
                    if (container._cy) { container._cy.destroy(); container._cy = null; }

                    const cy = cytoscape({
                        container,
                        elements: data.elements,
                        style: [
                            {
                                selector: 'node',
                                style: {
                                    'background-color': 'data(color)',
                                    'label': 'data(label)',
                                    'text-wrap': 'wrap',
                                    'text-max-width': '120px',
                                    'font-size': '10px',
                                    'font-weight': '600',
                                    'color': '#fff',
                                    'text-outline-color': 'data(color)',
                                    'text-outline-width': '2px',
                                    'width': '60px',
                                    'height': '60px',
                                    'text-valign': 'center',
                                    'text-halign': 'center',
                                    'border-width': '2px',
                                    'border-color': '#fff',
                                    'border-opacity': '0.6',
                                }
                            },
                            {
                                selector: 'node[node_type = "DECISION"]',
                                style: { 'shape': 'diamond', 'width': '90px', 'height': '90px', 'font-size': '9px' }
                            },
                            {
                                selector: 'node[node_type = "PERSON"]',
                                style: { 'shape': 'ellipse' }
                            },
                            {
                                selector: 'node[node_type = "RULE"]',
                                style: { 'shape': 'round-rectangle', 'width': '80px', 'font-size': '9px' }
                            },
                            {
                                selector: 'edge',
                                style: {
                                    'width': 1.5,
                                    'line-color': '#94a3b8',
                                    'target-arrow-color': '#94a3b8',
                                    'target-arrow-shape': 'triangle',
                                    'curve-style': 'bezier',
                                    'label': 'data(label)',
                                    'font-size': '8px',
                                    'color': '#64748b',
                                    'text-background-color': '#fff',
                                    'text-background-opacity': '0.8',
                                    'text-background-padding': '2px',
                                }
                            },
                            {
                                selector: ':selected',
                                style: { 'border-width': '3px', 'border-color': '#1d4ed8', 'border-opacity': '1' }
                            }
                        ],
                        layout: {
                            name: 'dagre',
                            rankDir: 'TB',
                            nodeSep: 60,
                            rankSep: 80,
                            padding: 30,
                            animate: true,
                            animationDuration: 400,
                        }
                    });

                    container._cy = cy;

                    // Click node → show tooltip
                    cy.on('tap', 'node', (evt) => {
                        const d = evt.target.data();
                        this.kgTooltip = d;
                    });
                    cy.on('tap', (evt) => {
                        if (evt.target === cy) this.kgTooltip = null;
                    });

                    this.kgLoading = false;
                } catch (e) {
                    this.kgLoading = false;
                    this.kgError = e.message || String(e);
                }
            });
        },

        _connectWS(initialExplanation) {
            if (this.ws) { try { this.ws.close(); } catch(e) {} }
            this.clientId = `popup_${this.bsn}_${Date.now()}`;
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            this.ws = new WebSocket(`${proto}://${location.host}/chat/ws/${this.clientId}`);
            this.ws.onopen = () => {
                const lang = localStorage.getItem('regelrecht-lang') || 'nl';
                this.ws.send(JSON.stringify({ bsn: this.bsn, initial_message: initialExplanation || '', lang }));
            };
            this.ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.connected) { this.connected = true; return; }
                if (data.error) {
                    this.thinking = false;
                    this.messages.push({ role: 'assistant', text: data.error, html: this._md(data.error) });
                    this._scrollToBottom(); return;
                }
                if (data.html || data.message) {
                    this.thinking = false;
                    const text = data.message || '';
                    this.messages.push({ role: 'assistant', text, html: data.html || this._md(text) });
                    this._scrollToBottom();
                }
            };
            this.ws.onerror = () => { this.thinking = false; this.connected = false; };
            this.ws.onclose = () => { this.connected = false; };
        },

        send() {
            const text = this.inputText.trim();
            if (!text || !this.ws || this.thinking) return;
            this.messages.push({ role: 'user', text, html: this._escapeHtml(text) });
            this.inputText = '';
            this.thinking = true;
            this.ws.send(JSON.stringify({ message: text }));
            this._scrollToBottom();
        },

        close() {
            this.open = false;
            this.step = 'idle';
            this.showGraph = false;
            this.showKnowledgeGraph = false;
            this.inputFields = [];
            this.editedValues = {};
            if (this.ws) { try { this.ws.close(); } catch(e) {} this.ws = null; }
            this.connected = false;
        },

        _scrollToBottom() {
            this.$nextTick(() => {
                const el = document.getElementById('chat-popup-messages');
                if (el) el.scrollTop = el.scrollHeight;
            });
        },

        _renderPath(node, depth) {
            if (!node) return '';
            const d = depth || 0;
            const typeColor = {
                'SOURCE': 'bg-blue-100 text-blue-700', 'SOURCE_OVERRIDE': 'bg-sky-100 text-sky-700',
                'PARAMETER': 'bg-green-100 text-green-700', 'CLAIM': 'bg-amber-100 text-amber-700',
                'APPROVED_CASE': 'bg-teal-100 text-teal-700', 'DEFINITION': 'bg-gray-100 text-gray-600',
                'OVERRIDE_DEFINITION': 'bg-orange-100 text-orange-700', 'OUTPUT': 'bg-cyan-100 text-cyan-700',
                'LOCAL': 'bg-indigo-100 text-indigo-600', 'OVERWRITE': 'bg-pink-100 text-pink-700',
                'NONE': 'bg-red-100 text-red-500',
            };
            const isService = node.type === 'service_evaluation';
            const det = node.details || {};
            const resolveType = det.resolve_type || '';
            const fieldName = det.path || node.name || '';
            const val = (node.result !== undefined && node.result !== null) ? String(node.result) : '';
            const valIsNone = !val || val === 'None';
            const hasKids = Array.isArray(node.children) && node.children.length > 0;
            const badge = isService ? 'bg-purple-100 text-purple-700' : (typeColor[resolveType] || 'bg-gray-50 text-gray-400');
            const label = isService ? (det.service || 'SERVICE') : resolveType;
            const open = d < 2 ? ' open' : '';
            const arrow = `<svg class="path-arrow shrink-0 w-3 h-3 text-gray-400 transition-transform" style="min-width:12px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>`;
            const spacer = `<span style="min-width:12px;display:inline-block"></span>`;
            const badgeHtml = label ? `<span class="shrink-0 text-xs px-1.5 py-0.5 rounded font-medium ${badge}">${this._esc(label)}</span>` : '';
            const nameHtml = fieldName ? `<span class="font-mono text-gray-700 truncate">${this._esc(fieldName)}</span>` : '';
            const valHtml = !isService && val ? `<span class="text-gray-300 mx-1">·</span><span class="${valIsNone ? 'text-red-400 italic' : 'font-semibold text-gray-900'}">${valIsNone ? '—' : this._esc(val)}</span>` : '';
            const lawHtml = isService && det.law ? `<span class="text-gray-400 text-xs ml-1">${this._esc(det.law)}</span>` : '';
            const row = `${badgeHtml}${nameHtml}${valHtml}${lawHtml}`;
            if (!hasKids) return `<div class="flex items-center gap-1.5 py-0.5 px-1 rounded hover:bg-gray-50">${spacer}${row}</div>`;
            const kids = node.children.map(c => this._renderPath(c, d + 1)).join('');
            return `<details${open} class="group"><summary class="flex items-center gap-1.5 py-0.5 px-1 rounded hover:bg-gray-50 cursor-pointer">${arrow}${row}</summary><div class="ml-3 pl-2 border-l border-gray-100">${kids}</div></details>`;
        },

        _esc(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        },
        _escapeHtml(text) {
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        },
        _md(text) {
            if (!text) return '';
            return text
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                .replace(/^- (.+)$/gm,'<li class="ml-3 list-disc">$1</li>')
                .replace(/(<li[^>]*>.*<\/li>)/gs,'<ul class="space-y-0.5 my-1">$1</ul>')
                .replace(/\n/g,'<br>');
        },
    };
}

window.openExplanationChat = function(service, law, bsn, lawName, kvk) {
    const root = document.querySelector('#chat-popup-root');
    const popup = root?.__x?.$data || (root ? Alpine.$data(root) : null);
    if (popup) popup.openWithExplanation(service, law, bsn, lawName, kvk);
};
</script>
